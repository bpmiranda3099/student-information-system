name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sis_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sis_test
      JWT_ACCESS_SECRET: test-access-secret-minimum-32-characters-long
      JWT_REFRESH_SECRET: test-refresh-secret-minimum-32-characters-long
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @sis/shared build
      - run: pnpm --filter @sis/shared test

      - run: pnpm --filter @sis/api db:generate
      - run: pnpm --filter @sis/api exec prisma db push --skip-generate
      - run: pnpm --filter @sis/api build
      - run: pnpm --filter @sis/api test

      - run: pnpm --filter @sis/web build

  e2e:
    runs-on: ubuntu-latest
    needs: lint-and-test

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sis_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sis_e2e
      JWT_ACCESS_SECRET: test-access-secret-minimum-32-characters-long
      JWT_REFRESH_SECRET: test-refresh-secret-minimum-32-characters-long
      NEXT_PUBLIC_API_URL: http://localhost:4000
      CORS_ORIGINS: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @sis/shared build
      - run: pnpm --filter @sis/api db:generate
      - run: pnpm --filter @sis/api exec prisma db push --skip-generate
      - run: pnpm --filter @sis/api db:seed
      - run: pnpm --filter @sis/api build
      - run: pnpm --filter @sis/web build

      - name: Install Playwright
        run: pnpm exec playwright install chromium --with-deps

      - name: Start API
        run: pnpm --filter @sis/api start &
        env:
          PORT: 4000

      - name: Start Web
        run: pnpm --filter @sis/web start &
        env:
          PORT: 3000

      - name: Wait for services
        run: |
          npx wait-on http://localhost:4000/health http://localhost:3000 -t 60000

      - run: pnpm test:e2e
