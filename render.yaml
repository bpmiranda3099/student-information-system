services:
  - type: web
    name: sis-api
    runtime: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @sis/api db:generate && pnpm exec turbo run build --filter=@sis/api
    preDeployCommand: pnpm --filter @sis/api exec prisma migrate deploy
    startCommand: node apps/api/dist/index.js
    healthCheckPath: /health
    buildFilter:
      paths:
        - apps/api/**
        - packages/shared/**
        - pnpm-lock.yaml
        - package.json
        - pnpm-workspace.yaml
        - turbo.json
        - render.yaml
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.5-flash
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: CORS_ORIGINS
        sync: false
